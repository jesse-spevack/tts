name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-hub:
    # Only run if CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Fetch secrets from Secret Manager
        run: |
          fetch_secret() {
            local name=$1
            local secret_name=$2
            local value
            value=$(gcloud secrets versions access latest --secret="$secret_name")
            echo "::add-mask::$value"
            echo "$name=$value" >> "$GITHUB_ENV"
          }

          fetch_secret RAILS_MASTER_KEY rails-master-key
          fetch_secret RESEND_API_KEY resend-api-key
          fetch_secret RESEND_WEBHOOK_SECRET resend-webhook-secret
          fetch_secret APP_HOST mailer-host
          fetch_secret MAILER_FROM_ADDRESS mailer-from-address
          fetch_secret GOOGLE_CLOUD_BUCKET google-cloud-bucket
          fetch_secret GOOGLE_CLOUD_PROJECT google-cloud-project
          fetch_secret SERVICE_ACCOUNT_EMAIL service-account-email
          fetch_secret VERTEX_AI_LOCATION vertex-ai-location
          fetch_secret STRIPE_SECRET_KEY stripe-secret-key
          fetch_secret STRIPE_PUBLISHABLE_KEY stripe-publishable-key
          fetch_secret STRIPE_WEBHOOK_SECRET stripe-webhook-secret
          fetch_secret STRIPE_PRICE_ID_MONTHLY stripe-price-id-monthly
          fetch_secret STRIPE_PRICE_ID_ANNUAL stripe-price-id-annual
          fetch_secret STRIPE_PRICE_ID_CREDIT_PACK stripe-price-id-credit-pack

          # Generate OAuth2 access token for Artifact Registry
          KAMAL_TOKEN=$(gcloud auth print-access-token)
          echo "::add-mask::$KAMAL_TOKEN"
          echo "KAMAL_REGISTRY_PASSWORD=$KAMAL_TOKEN" >> "$GITHUB_ENV"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Add VM to known_hosts
        run: ssh-keyscan 34.63.167.166 >> ~/.ssh/known_hosts

      - name: Write Kamal secrets
        run: |
          cat > .kamal/secrets << EOF
          RAILS_MASTER_KEY=$RAILS_MASTER_KEY
          RESEND_API_KEY=$RESEND_API_KEY
          RESEND_WEBHOOK_SECRET=$RESEND_WEBHOOK_SECRET
          APP_HOST=$APP_HOST
          MAILER_FROM_ADDRESS=$MAILER_FROM_ADDRESS
          GOOGLE_CLOUD_BUCKET=$GOOGLE_CLOUD_BUCKET
          GOOGLE_CLOUD_PROJECT=$GOOGLE_CLOUD_PROJECT
          SERVICE_ACCOUNT_EMAIL=$SERVICE_ACCOUNT_EMAIL
          VERTEX_AI_LOCATION=$VERTEX_AI_LOCATION
          STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
          STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY
          STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
          STRIPE_PRICE_ID_MONTHLY=$STRIPE_PRICE_ID_MONTHLY
          STRIPE_PRICE_ID_ANNUAL=$STRIPE_PRICE_ID_ANNUAL
          STRIPE_PRICE_ID_CREDIT_PACK=$STRIPE_PRICE_ID_CREDIT_PACK
          KAMAL_REGISTRY_PASSWORD=$KAMAL_REGISTRY_PASSWORD
          EOF

      - name: Deploy with Kamal
        run: bin/kamal deploy

      - name: Prune old Docker images on server
        if: success()
        run: ssh jesse@34.63.167.166 "docker image prune -a --filter 'until=72h' -f"
